<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonaHub</title>
  <link rel="stylesheet" href="src/output.css" />
  <style>
    .pill-btn {
      padding: 0.5rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background: none;
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    
    .pill-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }
    
    .pill-btn.active {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.5);
      color: #818cf8;
    }
    
    .tag {
      display: inline-block;
      padding: 0.375rem 0.625rem;
      border-radius: 0.375rem;
      font-size: 0.7rem;
      font-family: monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid;
    }
    
    .tag-indigo {
      background: rgba(99, 102, 241, 0.12);
      color: #a5b4fc;
      border-color: rgba(99, 102, 241, 0.25);
    }
    
    .tag-pink {
      background: rgba(236, 72, 153, 0.1);
      color: #fbb6ce;
      border-color: rgba(236, 72, 153, 0.22);
    }
    
    .tag-green {
      background: rgba(16, 185, 129, 0.1);
      color: #6ee7b7;
      border-color: rgba(16, 185, 129, 0.22);
    }
    
    .tag-amber {
      background: rgba(245, 158, 11, 0.1);
      color: #fde68a;
      border-color: rgba(245, 158, 11, 0.22);
    }
    
    .tag-blue {
      background: rgba(59, 130, 246, 0.1);
      color: #bfdbfe;
      border-color: rgba(59, 130, 246, 0.22);
    }
    
    .tag-purple {
      background: rgba(168, 85, 247, 0.1);
      color: #e9d5ff;
      border-color: rgba(168, 85, 247, 0.22);
    }
  </style>
</head>
<body class="min-h-screen bg-neutral-950">
  <!-- Navigation -->
  <nav class="sticky top-0 z-50 flex items-center justify-between px-8 py-4 border-b border-white/10 backdrop-blur bg-black/50">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-indigo-600 flex items-center justify-center font-bold text-xs text-amber-50">PH</div>
      <span class="font-bold text-sm text-amber-50">PersonaHub</span>
    </div>
    <ul class="hidden md:flex items-center gap-1">
      <li><a href="#" class="px-4 py-1.5 rounded-full text-xs text-gray-300 hover:text-white">Team</a></li>
      <li><a href="#" class="px-4 py-1.5 rounded-full text-xs text-gray-300 hover:text-white">Projects</a></li>
      <li><a href="#" class="px-4 py-1.5 rounded-full text-xs text-gray-300 hover:text-white">Services</a></li>
      <li><a href="#" class="px-4 py-1.5 rounded-full text-xs text-gray-300 hover:text-white">Blogs</a></li>
      <li><a href="#" class="px-4 py-1.5 rounded-full text-xs text-gray-300 hover:text-white">Contact</a></li>
    </ul>
    <div class="flex items-center gap-3">
      <span class="px-3 py-1 rounded-full font-mono text-xs text-indigo-400 border border-indigo-500/30 bg-indigo-500/10">Pro Plan</span>
  
    </div>
  </nav>

  <!-- Main Content -->
  <main class="relative z-10 max-w-5xl mx-auto px-8 py-16">
    <!-- Hero Section -->
    <div class="mb-12">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-5 h-px bg-indigo-500"></div>
        <span class="font-mono text-xs uppercase tracking-widest text-indigo-400">Engineering Team</span>
      </div>
      <h1 class="text-5xl font-bold mb-3 text-amber-50" >Meet the <span class="text-indigo-400">Developers</span></h1>
      <p class="font-mono text-xs text-gray-400 tracking-wide">6 members · 3 departments · Est. 2019</p>
    </div>

    

</body>
</html>
